mode: daemonset

image:
  repository: otel/opentelemetry-collector-contrib

presets:
  logsCollection:
    enabled: true
    includeCollectorLogs: false
  kubernetesAttributes:
    enabled: true
  kubeletMetrics:
    enabled: true
  hostMetrics:
    enabled: true

service:
  enabled: true
  type: ClusterIP

serviceAccount:
  create: true
  name: otel-collector

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "nodes", "nodes/stats", "nodes/proxy", "namespaces"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["replicasets", "deployments", "daemonsets", "statefulsets"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["batch"]
      resources: ["jobs", "cronjobs"]
      verbs: ["get", "list", "watch"]

extraEnvs:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: NEW_RELIC_LICENSE_KEY
    value: "eu01xxb2c7b50ff6ebdf34097bfd0d1cFFFFNRAL"
  - name: K8S_CLUSTER_NAME
    value: "k8s-cluster"

config:
  receivers:
    filelog:
      include:
        - /var/log/pods/platform_*/*/*.log
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    kubeletstats:
      collection_interval: 60s
      auth_type: serviceAccount
      endpoint: "https://${env:K8S_NODE_NAME}:10250"
      insecure_skip_verify: true
    hostmetrics:
      collection_interval: 60s
      scrapers:
        cpu: {}
        memory: {}
        disk: {}
        network: {}

  processors:
    batch: {}
    memory_limiter:
      check_interval: 1s
      limit_mib: 400
    k8sattributes:
      auth_type: serviceAccount
    resource:
      attributes:
        - key: k8s.cluster.name
          value: ${env:K8S_CLUSTER_NAME}
          action: upsert
    transform/logs:
      log_statements:
        - context: log
          statements:
            # Promote trace_id/span_id from JSON log attributes → OTLP first-class fields
            # so New Relic can correlate logs ↔ traces by trace ID
            - set(trace_id.string, attributes["trace_id"]) where attributes["trace_id"] != nil
            - set(span_id.string, attributes["span_id"]) where attributes["span_id"] != nil
            - delete_key(attributes, "trace_id")
            - delete_key(attributes, "span_id")


  exporters:
    debug:
      verbosity: normal
    otlphttp/newrelic:
      endpoint: "https://otlp.eu01.nr-data.net"
      headers:
        api-key: ${env:NEW_RELIC_LICENSE_KEY}

  service:
    pipelines:
      metrics:
        receivers: [kubeletstats, hostmetrics, otlp]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [otlphttp/newrelic]
      logs:
        processors: [memory_limiter, k8sattributes, resource, transform/logs, batch]
        exporters: [otlphttp/newrelic]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [otlphttp/newrelic, debug]
