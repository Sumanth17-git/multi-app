{{- if .Values.otel.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "multi-app-platform.fullname" . }}-otel-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multi-app-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Full OTLP header value — consumed by OTEL_EXPORTER_OTLP_HEADERS env var
  otlp-headers: {{ printf "api-key=%s" .Values.otel.licenseKey | quote }}
{{- end }}
