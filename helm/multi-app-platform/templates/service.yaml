# One ClusterIP Service per enabled profile
{{- range $profile, $config := .Values.profiles }}
{{- if $config.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "multi-app-platform.fullname" $ }}-{{ $profile }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "multi-app-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $profile }}
spec:
  type: {{ $.Values.service.type }}
  ports:
    - name: http
      port: {{ $.Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "multi-app-platform.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $profile }}
{{- end }}
{{- end }}
