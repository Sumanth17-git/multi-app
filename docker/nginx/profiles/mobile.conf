# platform.conf — mobile profile
# Routes: /nexus  /sentinel  /carehub
# scheduler is NOT in this profile

upstream nexus_backend    { server 127.0.0.1:7500; keepalive 16; }
upstream sentinel_backend { server 127.0.0.1:7507; keepalive 16; }
upstream carehub_backend  { server 127.0.0.1:7522; keepalive 16; }

server {
    listen      80 default_server;
    server_name _;

    location /healthz {
        access_log off;
        return 200 '{"status":"UP","profile":"mobile"}';
        add_header Content-Type application/json;
    }

    location /nexus/ {
        proxy_pass http://nexus_backend/nexus/;
    }

    location /sentinel/ {
        proxy_pass http://sentinel_backend/sentinel/;
    }

    location /carehub/ {
        proxy_pass http://carehub_backend/carehub/;
    }

    location / {
        return 404 '{"error":"route not found","profile":"mobile"}';
        add_header Content-Type application/json;
    }
}
