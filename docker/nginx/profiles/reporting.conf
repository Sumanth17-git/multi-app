# platform.conf — reporting profile
# Routes: /nexus  /sentinel  /scheduler
# carehub is NOT in this profile

upstream nexus_backend     { server 127.0.0.1:7500; keepalive 16; }
upstream sentinel_backend  { server 127.0.0.1:7507; keepalive 16; }
upstream scheduler_backend { server 127.0.0.1:7530; keepalive 16; }

server {
    listen      80 default_server;
    server_name _;

    location /healthz {
        access_log off;
        return 200 '{"status":"UP","profile":"reporting"}';
        add_header Content-Type application/json;
    }

    location /nexus/ {
        proxy_pass http://nexus_backend/nexus/;
    }

    location /sentinel/ {
        proxy_pass http://sentinel_backend/sentinel/;
    }

    location /scheduler/ {
        proxy_pass http://scheduler_backend/scheduler/;
    }

    location / {
        return 404 '{"error":"route not found","profile":"reporting"}';
        add_header Content-Type application/json;
    }
}
