# =============================================================================
# platform.conf — STATIC template baked into image
#
# This file is REPLACED at container startup by 01-profile-init.sh,
# which generates a profile-specific version with only active upstreams.
# This static version serves as documentation and a fallback reference.
# =============================================================================

# -----------------------------------------------------------------------------
# Upstreams — one per WAR service
# -----------------------------------------------------------------------------
upstream nexus_backend {
    server 127.0.0.1:7500;
    keepalive 16;
}

upstream sentinel_backend {
    server 127.0.0.1:7507;
    keepalive 16;
}

upstream carehub_backend {
    server 127.0.0.1:7522;
    keepalive 16;
}

upstream scheduler_backend {
    server 127.0.0.1:7530;
    keepalive 16;
}

# -----------------------------------------------------------------------------
# Server Block
# -----------------------------------------------------------------------------
server {
    listen       80 default_server;
    server_name  _;

    # Health check endpoint — always available, no upstream needed
    location /healthz {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ------------------------------------------------------------------
    # nexus — API Gateway (all profiles)
    # ------------------------------------------------------------------
    location /nexus/ {
        proxy_pass http://nexus_backend/nexus/;
    }

    # ------------------------------------------------------------------
    # sentinel — Identity/Auth (all profiles)
    # ------------------------------------------------------------------
    location /sentinel/ {
        proxy_pass http://sentinel_backend/sentinel/;
    }

    # ------------------------------------------------------------------
    # carehub — Care Records (core + mobile only)
    # ------------------------------------------------------------------
    location /carehub/ {
        proxy_pass http://carehub_backend/carehub/;
    }

    # ------------------------------------------------------------------
    # scheduler — Appointment Scheduler (core + reporting only)
    # ------------------------------------------------------------------
    location /scheduler/ {
        proxy_pass http://scheduler_backend/scheduler/;
    }

    # Catch-all
    location / {
        return 404 '{"error":"route not found"}';
        add_header Content-Type application/json;
    }
}
